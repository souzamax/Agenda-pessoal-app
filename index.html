<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#171614" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Agenda" />
  <title>Agenda App</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon-192.png" />
  <link rel="apple-touch-icon" href="./assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #11100f;
      --surface: #1a1917;
      --surface-2: #23211f;
      --line: #35322d;
      --text: #f1ebe2;
      --muted: #b0a99f;
      --primary: #62aab3;
      --primary-soft: #213235;
      --sport: #f09a37;
      --study: #b389ff;
      --reading: #78b84c;
      --work: #9c8f82;
      --rest: #8993a0;
      --radius: 20px;
      --radius-sm: 14px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --font: 'Instrument Sans', system-ui, sans-serif;
      --mono: 'IBM Plex Mono', monospace;
      --safe-top: max(env(safe-area-inset-top), 12px);
      --safe-bottom: max(env(safe-area-inset-bottom), 18px);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; background: var(--bg); color: var(--text); font-family: var(--font); }
    body {
      background:
        radial-gradient(circle at top, rgba(98,170,179,.17), transparent 32%),
        linear-gradient(180deg, #161412 0%, #11100f 100%);
    }
    button, input { font: inherit; }
    button { cursor: pointer; border: 0; }
    .app { max-width: 460px; margin: 0 auto; min-height: 100dvh; padding: var(--safe-top) var(--space-4) calc(92px + var(--safe-bottom)); }
    .hero {
      background: rgba(26,25,23,.82);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 28px;
      padding: var(--space-5);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
    }
    .kicker {
      font: 500 12px/1.4 var(--mono);
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--space-2);
    }
    h1 { margin:0; font-size: 30px; line-height: 1.05; letter-spacing: -.03em; }
    .hero p { margin: 10px 0 0; color: var(--muted); }
    .install-bar {
      display:flex; gap: var(--space-2); margin-top: var(--space-4); flex-wrap:wrap;
    }
    .btn {
      min-height: 46px; padding: 0 16px; border-radius: 999px; background: var(--surface-2); color: var(--text); border:1px solid rgba(255,255,255,.08);
    }
    .btn.primary { background: var(--primary-soft); color: #cce8ec; border-color: rgba(98,170,179,.35); }
    .section { margin-top: var(--space-5); }
    .section-head { display:flex; align-items:center; justify-content:space-between; gap: var(--space-2); margin-bottom: var(--space-3); }
    .section-head h2 { margin:0; font-size: 18px; }
    .pills, .day-tabs { display:flex; gap:8px; overflow:auto; scrollbar-width:none; padding-bottom: 2px; }
    .pills::-webkit-scrollbar, .day-tabs::-webkit-scrollbar { display:none; }
    .pill, .day-tab {
      white-space: nowrap; min-height: 40px; padding: 0 14px; border-radius: 999px; background: var(--surface); color: var(--muted);
      border: 1px solid rgba(255,255,255,.08);
    }
    .pill.active, .day-tab.active { background: var(--primary-soft); color: var(--text); border-color: rgba(98,170,179,.35); }
    .summary-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .card {
      background: rgba(26,25,23,.88); border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius); padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.24);
    }
    .card small { display:block; color: var(--muted); font:500 12px/1.4 var(--mono); text-transform:uppercase; letter-spacing:.08em; }
    .card strong { display:block; margin-top: 8px; font-size: 22px; }
    .agenda-list { display:grid; gap: 12px; }
    .item {
      display:grid; grid-template-columns: 62px 1fr; gap: 12px; align-items: start;
    }
    .time { color: var(--muted); font:500 12px/1.35 var(--mono); padding-top: 8px; text-align:left; }
    .event {
      background: rgba(26,25,23,.9); border:1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 14px;
    }
    .tag {
      display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:4px 9px; margin-bottom:8px;
      font:500 11px/1.25 var(--mono); text-transform: uppercase; letter-spacing:.04em;
    }
    .sport { background: rgba(240,154,55,.16); color: var(--sport); }
    .study { background: rgba(179,137,255,.16); color: var(--study); }
    .reading { background: rgba(120,184,76,.16); color: var(--reading); }
    .work { background: rgba(156,143,130,.16); color: var(--work); }
    .rest { background: rgba(137,147,160,.16); color: var(--rest); }
    .event h3 { margin:0 0 4px; font-size: 16px; }
    .event p { margin:0; color: var(--muted); font-size: 14px; }
    .week-mini { display:grid; gap:10px; }
    .week-row {
      background: rgba(26,25,23,.88); border:1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 14px;
    }
    .week-row strong { display:block; margin-bottom:10px; font-size: 15px; }
    .badges { display:flex; gap:8px; flex-wrap:wrap; }
    .badge {
      padding:6px 10px; border-radius:999px; background: var(--surface-2); color: var(--text); font-size: 12px; border:1px solid rgba(255,255,255,.06);
    }
    .nav {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: max(12px, env(safe-area-inset-bottom)); width: min(430px, calc(100vw - 24px));
      background: rgba(26,25,23,.92); border:1px solid rgba(255,255,255,.09); border-radius: 24px; padding: 10px; display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; backdrop-filter: blur(14px);
      box-shadow: 0 20px 44px rgba(0,0,0,.36);
    }
    .nav button { min-height: 52px; border-radius: 16px; color: var(--muted); background: transparent; }
    .nav button.active { background: var(--primary-soft); color: var(--text); }
    .screen { display:none; }
    .screen.active { display:block; }
    .note { color: var(--muted); font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="kicker">Agenda pessoal mobile</div>
      <h1>Seu cronograma como um app de bolso</h1>
      <p>Versão mobile-first para abrir rápido no celular, consultar seus horários e deixar na tela inicial.</p>
      <div class="install-bar">
        <button class="btn primary" id="installBtn" hidden>Instalar no celular</button>
        <button class="btn" id="todayBtn">Ir para hoje</button>
      </div>
      <div class="note" id="installHint">No iPhone/Safari, use Compartilhar → Adicionar à Tela de Início.</div>
    </section>

    <section class="section screen active" id="screenHoje">
      <div class="section-head">
        <h2>Agenda diária</h2>
      </div>
      <div class="day-tabs" id="dayTabs"></div>
      <div class="summary-grid section">
        <article class="card"><small>Esportes</small><strong id="sportCount">0</strong></article>
        <article class="card"><small>Estudos</small><strong id="studyCount">0</strong></article>
      </div>
      <div class="agenda-list section" id="agendaList"></div>
    </section>

    <section class="section screen" id="screenSemana">
      <div class="section-head">
        <h2>Semana resumida</h2>
      </div>
      <div class="week-mini" id="weekMini"></div>
    </section>

    <section class="section screen" id="screenFiltros">
      <div class="section-head">
        <h2>Filtros rápidos</h2>
      </div>
      <div class="pills" id="filterPills">
        <button class="pill active" data-filter="all">Tudo</button>
        <button class="pill" data-filter="sport">Esportes</button>
        <button class="pill" data-filter="study">Estudos</button>
        <button class="pill" data-filter="reading">Leitura</button>
        <button class="pill" data-filter="rest">Livre</button>
      </div>
      <div class="agenda-list section" id="filteredList"></div>
    </section>
  </div>

  <nav class="nav" aria-label="Navegação principal">
    <button class="active" data-screen="Hoje">Hoje</button>
    <button data-screen="Semana">Semana</button>
    <button data-screen="Filtros">Filtros</button>
  </nav>

  <script>
    const days = [
      { key:'seg', label:'Seg' }, { key:'ter', label:'Ter' }, { key:'qua', label:'Qua' },
      { key:'qui', label:'Qui' }, { key:'sex', label:'Sex' }, { key:'sab', label:'Sáb' }, { key:'dom', label:'Dom' }
    ];
    const fullNames = { seg:'Segunda', ter:'Terça', qua:'Quarta', qui:'Quinta', sex:'Sexta', sab:'Sábado', dom:'Domingo' };
    const events = [
      { day:'seg', start:'08:00', end:'17:00', title:'Trabalho', type:'work', detail:'Horário de trabalho' },
      { day:'seg', start:'12:00', end:'12:30', title:'Clube do livro', type:'reading', detail:'Leitura diária' },
      { day:'seg', start:'20:00', end:'21:00', title:'Pilates', type:'sport', detail:'Treino da noite' },
      { day:'seg', start:'21:15', end:'22:45', title:'MBA Gestão de Negócios', type:'study', detail:'Bloco principal de estudo' },

      { day:'ter', start:'08:00', end:'17:00', title:'Trabalho', type:'work', detail:'Horário de trabalho' },
      { day:'ter', start:'12:00', end:'13:00', title:'Matemática para Negócios', type:'study', detail:'Estudo no almoço' },
      { day:'ter', start:'18:00', end:'19:00', title:'CrossFit', type:'sport', detail:'Treino fixo' },
      { day:'ter', start:'19:30', end:'20:30', title:'Curso de IA', type:'study', detail:'Estudo noturno' },
      { day:'ter', start:'20:30', end:'21:00', title:'Clube do livro', type:'reading', detail:'Leitura diária' },

      { day:'qua', start:'07:30', end:'08:20', title:'Spinning', type:'sport', detail:'Aula da manhã' },
      { day:'qua', start:'08:20', end:'17:00', title:'Trabalho', type:'work', detail:'Expediente após aula' },
      { day:'qua', start:'12:00', end:'13:30', title:'Musculação', type:'sport', detail:'Treino no almoço' },
      { day:'qua', start:'12:00', end:'12:30', title:'Clube do livro', type:'reading', detail:'Leitura curta' },
      { day:'qua', start:'20:00', end:'21:00', title:'Pilates', type:'sport', detail:'Atividade esportiva' },
      { day:'qua', start:'21:15', end:'22:45', title:'MBA / IA', type:'study', detail:'Alternar por semana' },

      { day:'qui', start:'08:00', end:'17:00', title:'Trabalho', type:'work', detail:'Horário de trabalho' },
      { day:'qui', start:'12:00', end:'13:00', title:'Matemática para Negócios', type:'study', detail:'Estudo no almoço' },
      { day:'qui', start:'18:00', end:'19:00', title:'CrossFit', type:'sport', detail:'Treino fixo' },
      { day:'qui', start:'19:30', end:'21:00', title:'Curso de IA', type:'study', detail:'Bloco principal da noite' },

      { day:'sex', start:'08:00', end:'17:00', title:'Trabalho', type:'work', detail:'Horário de trabalho' },
      { day:'sex', start:'12:00', end:'13:30', title:'Musculação', type:'sport', detail:'Treino no almoço' },
      { day:'sex', start:'12:00', end:'12:30', title:'Clube do livro', type:'reading', detail:'Leitura diária' },
      { day:'sex', start:'17:00', end:'18:00', title:'Pilates', type:'sport', detail:'Fim do expediente' },
      { day:'sex', start:'18:30', end:'20:00', title:'MBA Gestão de Negócios', type:'study', detail:'Estudo da noite' },

      { day:'sab', start:'08:30', end:'09:30', title:'CrossFit', type:'sport', detail:'Treino de sábado' },
      { day:'sab', start:'10:30', end:'12:00', title:'Matemática / Revisão', type:'study', detail:'Estudo de 1h30' },
      { day:'sab', start:'14:00', end:'14:30', title:'Clube do livro', type:'reading', detail:'Leitura do dia' },
      { day:'sab', start:'15:30', end:'16:30', title:'Musculação', type:'sport', detail:'Horário sugerido até 17h' },
      { day:'sab', start:'17:00', end:'22:00', title:'Lazer / compromissos', type:'rest', detail:'Tempo livre' },

      { day:'dom', start:'09:15', end:'10:00', title:'Spinning', type:'sport', detail:'Opção 1' },
      { day:'dom', start:'10:15', end:'11:00', title:'Spinning', type:'sport', detail:'Opção 2' },
      { day:'dom', start:'11:00', end:'22:00', title:'Descanso e lazer', type:'rest', detail:'Sem estudo estruturado' }
    ];
    const navButtons = [...document.querySelectorAll('.nav button')];
    const screens = {
      Hoje: document.getElementById('screenHoje'),
      Semana: document.getElementById('screenSemana'),
      Filtros: document.getElementById('screenFiltros')
    };
    const dayTabs = document.getElementById('dayTabs');
    const agendaList = document.getElementById('agendaList');
    const weekMini = document.getElementById('weekMini');
    const filteredList = document.getElementById('filteredList');
    const filterPills = [...document.querySelectorAll('.pill')];
    const sportCount = document.getElementById('sportCount');
    const studyCount = document.getElementById('studyCount');
    let selectedDay = ['dom','seg','ter','qua','qui','sex','sab'][new Date().getDay()] || 'seg';
    let currentFilter = 'all';

    function typeLabel(type){ return ({sport:'Esporte',study:'Estudo',reading:'Leitura',work:'Trabalho',rest:'Livre'})[type]; }
    function sortEvents(list){ return [...list].sort((a,b)=> a.start.localeCompare(b.start)); }
    function renderDayTabs(){
      dayTabs.innerHTML='';
      days.forEach(day=>{
        const btn=document.createElement('button');
        btn.className='day-tab'+(day.key===selectedDay?' active':'');
        btn.textContent=day.label;
        btn.onclick=()=>{ selectedDay=day.key; renderToday(); renderDayTabs(); };
        dayTabs.appendChild(btn);
      });
    }
    function itemTemplate(ev){
      return `<div class="item"><div class="time">${ev.start}<br>até<br>${ev.end}</div><article class="event"><span class="tag ${ev.type}">${typeLabel(ev.type)}</span><h3>${ev.title}</h3><p>${ev.detail}</p></article></div>`;
    }
    function renderToday(){
      const list = sortEvents(events.filter(e=>e.day===selectedDay));
      agendaList.innerHTML = list.map(itemTemplate).join('');
      sportCount.textContent = list.filter(e=>e.type==='sport').length;
      studyCount.textContent = list.filter(e=>e.type==='study').length;
    }
    function renderWeek(){
      weekMini.innerHTML = days.map(day=>{
        const list = sortEvents(events.filter(e=>e.day===day.key));
        const badges = list.map(ev=>`<span class="badge">${ev.start} · ${ev.title}</span>`).join('');
        return `<article class="week-row"><strong>${fullNames[day.key]}</strong><div class="badges">${badges}</div></article>`;
      }).join('');
    }
    function renderFiltered(){
      const list = sortEvents(events.filter(e=> currentFilter==='all' ? true : e.type===currentFilter));
      filteredList.innerHTML = list.map(itemTemplate).join('');
    }
    navButtons.forEach(btn=>btn.addEventListener('click', ()=>{
      navButtons.forEach(b=>b.classList.toggle('active', b===btn));
      Object.entries(screens).forEach(([name, el])=> el.classList.toggle('active', name===btn.dataset.screen));
    }));
    filterPills.forEach(btn=>btn.addEventListener('click', ()=>{
      currentFilter = btn.dataset.filter;
      filterPills.forEach(b=>b.classList.toggle('active', b===btn));
      renderFiltered();
    }));
    document.getElementById('todayBtn').addEventListener('click', ()=>{
      navButtons[0].click();
      selectedDay = ['dom','seg','ter','qua','qui','sex','sab'][new Date().getDay()] || 'seg';
      renderDayTabs();
      renderToday();
      window.scrollTo({top:0, behavior:'smooth'});
    });
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.hidden = false;
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.hidden = true;
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
    }
    renderDayTabs();
    renderToday();
    renderWeek();
    renderFiltered();
  </script>
</body>
</html>
